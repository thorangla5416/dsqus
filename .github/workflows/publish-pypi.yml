name: Publish to PyPI

# Trigger on every push (no tag check for now)
on:
  push:
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # Temporarily disabled: tag-based version extraction and validation.
    # - name: Extract version from tag
    #   id: get_version
    #   run: |
    #     VERSION=${GITHUB_REF#refs/tags/v}
    #     echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
    #
    # - name: Verify version in pyproject.toml matches tag
    #   run: |
    #     TOML_VERSION=$(grep '^version' pyproject.toml | cut -d'"' -f2)
    #     TAG_VERSION=${{ steps.get_version.outputs.VERSION }}
    #     if [ "$TOML_VERSION" != "$TAG_VERSION" ]; then
    #       exit 1
    #     fi
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        # Use setuptools <70 to avoid License-Expression metadata issues with PyPI
        pip install "setuptools<70" wheel
        pip install build twine

    - name: Set unique CI version for push publish
      run: |
        VERSION="0.1.${GITHUB_RUN_NUMBER}.post${GITHUB_RUN_ATTEMPT}"
        sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
        echo "Publishing version: ${VERSION}"
        
    - name: Build package
      run: |
        python -m build
        ls -lh dist/
        
    - name: Check package with twine
      run: |
        twine check dist/*
        
    - name: Publish to Test PyPI (optional)
      if: github.event_name == 'workflow_dispatch'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.dsqus }}
      run: |
        echo "Publishing to Test PyPI..."
        twine upload --repository testpypi dist/* --skip-existing
        
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.dsqus }}
      run: |
        echo "Publishing to PyPI..."
        twine upload dist/*
        
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.PYPI_TOKEN }}